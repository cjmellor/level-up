name: Run Tests

on: pull_request

env:
  DB_FOREIGN_KEYS: false

jobs:
  tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        php: [8.3, 8.4, 8.5]
        laravel: ['12.*', '13.*']
        stability: [prefer-stable]
        key_type: [bigint]
        include:
          - php: 8.3
            laravel: '12.*'
            stability: prefer-lowest
            key_type: bigint
          - php: 8.3
            laravel: '12.*'
            stability: prefer-stable
            key_type: uuid
          - php: 8.3
            laravel: '12.*'
            stability: prefer-stable
            key_type: ulid

    name: >
      PHP: v${{ matrix.php }} [${{ matrix.stability }}] (id: ${{ matrix.key_type }})

    env:
      LEVELUP_TEST_KEY_TYPE: ${{ matrix.key_type }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: none

      - name: Setup problem matchers
        run: |
          echo "::add-matcher::${{ runner.tool_cache }}/php.json"
          echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      - name: Install dependencies
        run: |
          composer update --${{ matrix.stability }} --prefer-dist --no-interaction

      - name: Execute tests
        run: vendor/bin/pest --parallel

  quality:
    runs-on: ubuntu-latest

    name: "Static analysis & 100% coverage"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          tools: composer:v2
          coverage: xdebug

      - name: Install dependencies
        run: composer update --prefer-stable --prefer-dist --no-interaction

      - name: Lint (Pint + Rector dry-run)
        run: composer test:lint

      - name: Static analysis (PHPStan)
        run: composer test:types

      - name: Type coverage (100%)
        run: composer test:type-coverage

      - name: Tests with line coverage (exactly 100%)
        run: composer test:unit
